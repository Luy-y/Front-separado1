<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/login.css">

    <title>Página de Login</title>

    <!-- Configurações do PWA -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0d6efd" /> <!-- Cor da barra do navegador -->

    <!-- Tags para funcionar no iPhone (iOS) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="InovaWeb" />

    <!-- Ícones apontando para a pasta images -->
    <link rel="apple-touch-icon" href="images/icon-192.png" />
    <link rel="icon" type="image/png" href="images/icon-192.png" />

</head>

<body>

    <div class="background-glow"></div>

    <div class="login-card">

        <div class="login-header">
            <h2>Sistema de Gestão de Ambientes</h2>
            <p>Faça login para continuar</p>
        </div>

        <div class="input-group">
            <label>E-mail</label>
            <input type="email" id="email" placeholder="Digite seu e-mail">
        </div>

        <div class="input-group">
            <label>Senha</label>
            <input type="password" id="password" placeholder="Digite sua senha">
        </div>

        <button onclick="efetuarLogin()">Entrar</button>

        <div class="error" id="erro">
            Usuário ou senha inválidos
        </div>

        <div class="footer">
            <img src="img/tela1.png">
        </div>

    </div>

    <script src="js/login.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(() => console.log("Pronto! Seu site agora é um App."))
                .catch((err) => console.log("Erro ao criar o App:", err));
        }
    </script>

</body>

</html>
